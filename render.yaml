services:
  - type: web
    name: yt-share-pwa-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: YOUTUBE_COLLECTOR_API_KEY
        sync: false
      - key: MQTT_BROKER
        sync: false
      - key: MQTT_PORT
        value: "1883"
      - key: MQTT_TOPIC
        value: youtube/jobs
      - key: SMS_ALERT_ENABLED
        value: "true"
      - key: FREE_MOBILE_SMS_USER
        sync: false
      - key: FREE_MOBILE_SMS_PASS
        sync: false
      - key: SMS_ALERT_TIMEOUT_SECONDS
        value: "5"
      - key: SMS_ALERT_MESSAGE_TEMPLATE
        value: "New YouTube job queued: {youtube_url}"
