<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>YT Collector</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <div class="card-header">
          <div class="logo">📺</div>
          <div class="language-switcher" aria-label="Language">
            <button type="button" class="language-button" data-language="en" aria-label="English">🇺🇸</button>
            <button type="button" class="language-button" data-language="fr" aria-label="Français">🇫🇷</button>
          </div>
        </div>
        <h1 data-i18n="appTitle">Envoyer une vidéo</h1>
        <p class="subtitle" data-i18n="appSubtitle">Partage une vidéo YouTube vers cette app, ou colle un lien ici.</p>

        <div id="status" class="status hidden" aria-live="polite"></div>

        <form id="submit-form" class="form">
          <label for="url" class="label" data-i18n="youtubeLabel">Lien YouTube</label>
          <input
            id="url"
            name="url"
            type="url"
            inputmode="url"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            required
          />

          <button id="paste-button" type="button" class="secondary-button">
            <span data-i18n="pasteButton">📋 Coller depuis le presse-papiers</span>
          </button>

          <button id="submit-button" type="submit" class="primary-button">
            <span data-i18n="submitButton">📥 Envoyer</span>
          </button>
        </form>

        <div class="help-box">
          <strong data-i18n="simpleModeLabel">Mode simple :</strong>
          <span data-i18n="simpleModeText">YouTube → Partager → YT Collector</span>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./client-log.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
