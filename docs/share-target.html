<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Réception du partage</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <div class="card-header">
          <div class="logo">📥</div>
          <div class="language-switcher" aria-label="Language">
            <button type="button" class="language-button" data-language="en" aria-label="English">🇺🇸</button>
            <button type="button" class="language-button" data-language="fr" aria-label="Français">🇫🇷</button>
          </div>
        </div>
        <h1 data-i18n="shareTitle">Réception du partage</h1>
        <p class="subtitle" data-i18n="shareSubtitle">Traitement du lien YouTube...</p>
        <div id="status" class="status info" data-i18n="statusPreparing">Préparation de l'envoi...</div>
        <a href="./index.html" class="secondary-link" data-i18n="backHome">Retour à l'accueil</a>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./client-log.js"></script>
    <script src="./share-target.js" defer></script>
